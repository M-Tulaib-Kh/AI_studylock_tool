<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — StudyLock</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css" rel="stylesheet"/>
</head>
<body class="auth-page">
<div class="auth-card" style="max-width:520px">
  <div class="auth-logo">
    <div class="logo-icon">🔒</div>
    <h1>Create Account</h1>
    <p>Join StudyLock and start focusing</p>
  </div>

  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

  <form method="post" th:action="@{/auth/register}" th:object="${registerDto}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" th:field="*{fullName}" class="form-control" placeholder="Muhammad Ali" required/>
        <span th:if="${#fields.hasErrors('fullName')}" style="color:var(--danger);font-size:0.8rem" th:errors="*{fullName}"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" th:field="*{email}" class="form-control" placeholder="ali@uni.edu" required/>
        <span th:if="${#fields.hasErrors('email')}" style="color:var(--danger);font-size:0.8rem" th:errors="*{email}"></span>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" th:field="*{password}" class="form-control" placeholder="Min 6 characters" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select th:field="*{role}" class="form-control" onchange="toggleSemesterField()" id="roleSelect">
          <option value="STUDENT">Student</option>
          <option value="LECTURER">Lecturer</option>
        </select>
      </div>
    </div>
    <div class="form-row" id="semesterRow">
      <div class="form-group">
        <label class="form-label">Current Semester</label>
        <select th:field="*{semester}" class="form-control">
          <option value="1">Semester 1</option>
          <option value="2">Semester 2</option>
          <option value="3">Semester 3</option>
          <option value="4">Semester 4</option>
          <option value="5">Semester 5</option>
          <option value="6">Semester 6</option>
          <option value="7">Semester 7</option>
          <option value="8">Semester 8</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Department</label>
        <input type="text" th:field="*{department}" class="form-control" placeholder="Computer Science"/>
      </div>
      <div class="form-group">
        <label class="form-label">Reg No / Designation</label>
        <input type="text" th:field="*{registrationNo}" class="form-control" placeholder="2023-CS-01"/>
      </div>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem;">
      <i class="ti ti-user-plus"></i> Create Account
    </button>
  </form>
  <p style="text-align:center;margin-top:1rem;color:var(--text-muted);font-size:0.9rem;">
    Already have an account? <a th:href="@{/auth/login}" style="color:var(--primary);font-weight:600;">Sign In</a>
  </p>
</div>
<script>
function toggleSemesterField() {
  const role = document.getElementById('roleSelect').value;
  const row = document.getElementById('semesterRow');
  row.style.display = (role === 'STUDENT') ? 'flex' : 'none';
}
document.addEventListener('DOMContentLoaded', toggleSemesterField);
</script>
</body>
</html>
