<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — StudyLock</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css" rel="stylesheet"/>
  <style>
    body { background:linear-gradient(135deg,#0f0e1a 0%,#1a1428 50%,#0d1117 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    .login-card { width:100%; max-width:420px; animation:floatIn 0.5s ease; }
    @keyframes floatIn { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .brand { text-align:center; margin-bottom:2rem; }
    .brand-icon { width:64px; height:64px; background:linear-gradient(135deg,#7c3aed,#5b21b6); border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:2rem; margin:0 auto 1rem; box-shadow:0 8px 32px rgba(124,58,237,0.4); }
    .brand-name { font-size:1.75rem; font-weight:900; color:#fff; letter-spacing:-0.5px; }
    .brand-tagline { color:#6d6492; font-size:0.875rem; margin-top:0.25rem; }
    .card { background:rgba(26,24,40,0.9); border:1px solid rgba(124,58,237,0.2); backdrop-filter:blur(20px); border-radius:20px; padding:2rem; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
    .form-label { color:#a89fd4; font-size:0.82rem; font-weight:600; display:block; margin-bottom:0.4rem; }
    .form-control { background:rgba(255,255,255,0.05); border:1.5px solid rgba(124,58,237,0.2); color:#e8e3ff; border-radius:12px; padding:0.7rem 1rem; width:100%; font-size:0.9rem; transition:all 0.2s; outline:none; }
    .form-control:focus { border-color:#7c3aed; background:rgba(124,58,237,0.08); box-shadow:0 0 0 3px rgba(124,58,237,0.15); }
    .form-control::placeholder { color:#4a4060; }
    .btn-login { width:100%; background:linear-gradient(135deg,#7c3aed,#5b21b6); color:#fff; border:none; padding:0.8rem; border-radius:12px; font-weight:700; font-size:1rem; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 20px rgba(124,58,237,0.4); }
    .btn-login:hover { filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 8px 28px rgba(124,58,237,0.5); }
    .alert { padding:0.75rem 1rem; border-radius:10px; margin-bottom:1rem; font-size:0.875rem; }
    .alert-error   { background:rgba(239,68,68,0.15);  border:1px solid rgba(239,68,68,0.3);  color:#fca5a5; }
    .alert-success { background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.3); color:#6ee7b7; }
    .divider { display:flex; align-items:center; gap:1rem; margin:1.25rem 0; color:#4a4060; font-size:0.8rem; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(124,58,237,0.15); }
    a.reg-link { color:#a78bfa; text-decoration:none; font-weight:600; }
    a.reg-link:hover { color:#c4b5fd; }
    .input-icon { position:relative; }
    .input-icon i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#6d6492; font-size:1rem; }
    .input-icon .form-control { padding-left:2.5rem; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <div class="brand-icon">🔒</div>
    <div class="brand-name">StudyLock</div>
    <div class="brand-tagline">AI-Powered Academic Focus Platform</div>
  </div>
  <div class="card">
    <div th:if="${param.error}" class="alert alert-error"><i class="ti ti-alert-circle"></i> Invalid email or password. Please try again.</div>
    <div th:if="${param.logout}" class="alert alert-success"><i class="ti ti-check"></i> Logged out successfully.</div>
    <div th:if="${param.expired}" class="alert alert-error"><i class="ti ti-clock"></i> Session expired. Please log in again.</div>
    <div th:if="${param.registered}" class="alert alert-success"><i class="ti ti-check"></i> Account created! Please log in.</div>

    <form method="post" th:action="@{/auth/login}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-group" style="margin-bottom:1rem">
        <label class="form-label">Email Address</label>
        <div class="input-icon">
          <i class="ti ti-mail"></i>
          <input type="email" name="username" class="form-control" placeholder="your@email.com" required autofocus/>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:1.5rem">
        <label class="form-label">Password</label>
        <div class="input-icon">
          <i class="ti ti-lock"></i>
          <input type="password" name="password" id="pwdInput" class="form-control" placeholder="••••••••" required/>
        </div>
        <button type="button" onclick="togglePwd()" style="background:none;border:none;color:#6d6492;font-size:0.78rem;margin-top:4px;cursor:pointer;padding:0">
          <i class="ti ti-eye" id="eyeIcon"></i> Show password
        </button>
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>

    <div class="divider">or</div>
    <div style="text-align:center;color:#6d6492;font-size:0.875rem">
      Don't have an account? <a th:href="@{/auth/register}" class="reg-link">Create one</a>
    </div>
  </div>
  <div style="text-align:center;margin-top:1.5rem;color:#4a4060;font-size:0.78rem">
    StudyLock v3.0 — AI-Powered Learning
  </div>
</div>
<script>
function togglePwd(){
  const inp = document.getElementById('pwdInput');
  const ico = document.getElementById('eyeIcon');
  if(inp.type==='password'){ inp.type='text'; ico.className='ti ti-eye-off'; }
  else { inp.type='password'; ico.className='ti ti-eye'; }
}
// Apply dark mode preference
if(localStorage.getItem('darkMode')==='true') document.body.style.background='linear-gradient(135deg,#060610 0%,#0d0b1a 50%,#080d12 100%)';
</script>
</body>
</html>
