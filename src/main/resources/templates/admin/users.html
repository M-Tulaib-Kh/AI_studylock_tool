<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/layout :: layout(~{::title}, ~{::main})}">
<title>Users</title>
<main>

<div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start">
  <div>
    <h1 class="page-title">👥 User Management</h1>
    <p class="page-subtitle">Manage students, lecturers and admins</p>
  </div>
  <button onclick="document.getElementById('createModal').style.display='flex'" class="btn btn-primary">
    <i class="ti ti-user-plus"></i> Add User
  </button>
</div>

<!-- Stats -->
<div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:1.5rem">
  <div class="stat-card">
    <div class="stat-icon" style="background:var(--primary-gradient)">👥</div>
    <div class="stat-info"><div class="stat-number" th:text="${userStats.total}">0</div><div class="stat-label">Total</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="background:linear-gradient(135deg,#10b981,#059669)">🎓</div>
    <div class="stat-info"><div class="stat-number" th:text="${userStats.students}">0</div><div class="stat-label">Students</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="background:linear-gradient(135deg,#f59e0b,#d97706)">👨‍🏫</div>
    <div class="stat-info"><div class="stat-number" th:text="${userStats.lecturers}">0</div><div class="stat-label">Lecturers</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)">🛡</div>
    <div class="stat-info"><div class="stat-number" th:text="${userStats.admins}">0</div><div class="stat-label">Admins</div></div>
  </div>
</div>

<!-- Filters -->
<div class="card" style="margin-bottom:1.5rem">
  <div class="card-body" style="padding:1rem 1.5rem">
    <form method="get" th:action="@{/admin/users}" style="display:flex;gap:0.75rem;flex-wrap:wrap">
      <select name="role" class="form-control" style="width:auto" onchange="this.form.submit()">
        <option value="all" th:selected="${filterRole=='all'}">All Roles</option>
        <option value="student" th:selected="${filterRole=='student'}">Students</option>
        <option value="lecturer" th:selected="${filterRole=='lecturer'}">Lecturers</option>
        <option value="admin" th:selected="${filterRole=='admin'}">Admins</option>
      </select>
      <input type="text" name="search" th:value="${search}" class="form-control"
             placeholder="Search by name or email..." style="flex:1;min-width:200px"/>
      <button type="submit" class="btn btn-primary"><i class="ti ti-search"></i> Search</button>
    </form>
  </div>
</div>

<!-- Users Table -->
<div class="card">
  <div style="overflow-x:auto">
    <table class="table">
      <thead>
        <tr><th>Name</th><th>Email</th><th>Role</th><th>Department</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody>
        <tr th:each="u : ${users}">
          <td>
            <div style="display:flex;align-items:center;gap:0.75rem">
              <div style="width:34px;height:34px;border-radius:50%;background:var(--primary-gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:0.85rem;flex-shrink:0"
                   th:text="${#strings.substring(u.fullName,0,1)}"></div>
              <div>
                <div style="font-weight:600;display:flex;align-items:center;gap:0.4rem">
                  <span th:text="${u.fullName}"></span>
                  <span th:if="${u.role.name() == 'STUDENT' and u.semester != null}" class="badge"
                        style="background:var(--primary-light);color:var(--primary);font-size:0.68rem"
                        th:text="'Sem ' + ${u.semester}"></span>
                </div>
                <div style="font-size:0.75rem;color:var(--text-muted)"
                     th:text="${u.registrationNo ?: u.designation ?: ''}"></div>
              </div>
            </div>
          </td>
          <td th:text="${u.email}"></td>
          <td>
            <!-- ADMIN badge -->
            <span th:if="${u.role.name() == 'ADMIN'}" class="badge badge-purple">ADMIN</span>
            <!-- LECTURER badge -->
            <span th:if="${u.role.name() == 'LECTURER'}" class="badge badge-blue">LECTURER</span>
            <!-- STUDENT badge -->
            <span th:if="${u.role.name() == 'STUDENT'}" class="badge badge-green">STUDENT</span>
          </td>
          <td th:text="${u.department ?: '—'}"></td>
          <td>
            <span th:if="${u.active}" class="badge badge-green">Active</span>
            <span th:unless="${u.active}" class="badge badge-red">Inactive</span>
          </td>
          <td>
            <div style="display:flex;gap:0.4rem;flex-wrap:wrap">
              <form method="post" th:action="@{'/admin/users/' + ${u.id} + '/toggle'}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm btn-outline"
                        th:text="${u.active} ? 'Disable' : 'Enable'"></button>
              </form>
              <form th:if="${u.role.name() == 'STUDENT'}" method="post" th:action="@{'/admin/users/' + ${u.id} + '/semester'}"
                    style="display:flex;gap:0.25rem;align-items:center">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <select name="semester" class="form-control" style="padding:0.3rem 0.5rem;font-size:0.78rem;width:auto" onchange="this.form.submit()">
                  <option th:each="s : ${semesterOptionsForUsers}" th:value="${s}" th:text="'Sem ' + ${s}" th:selected="${s == u.semester}">Sem</option>
                </select>
              </form>
              <form method="post" th:action="@{'/admin/users/' + ${u.id} + '/delete'}"
                    onsubmit="return confirm('Delete this user permanently?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(users)}">
          <td colspan="6" style="text-align:center;padding:2.5rem;color:var(--text-muted)">No users found</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Create User Modal -->
<div id="createModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center">
  <div class="card" style="width:460px;max-width:95vw">
    <div class="card-header">
      <h3 class="card-title">Create New User</h3>
      <button onclick="document.getElementById('createModal').style.display='none'"
              style="background:none;border:none;cursor:pointer;font-size:1.25rem;color:var(--text-muted)">✕</button>
    </div>
    <div class="card-body">
      <form method="post" th:action="@{/admin/users/create}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="fullName" class="form-control" placeholder="Full Name" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="email@university.edu" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Minimum 6 characters" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select name="role" class="form-control" id="newUserRole" onchange="toggleNewUserSemester()">
            <option value="STUDENT">Student</option>
            <option value="LECTURER">Lecturer</option>
            <option value="ADMIN">Admin</option>
          </select>
        </div>
        <div class="form-group" id="newUserSemesterGroup">
          <label class="form-label">Semester</label>
          <select name="semester" class="form-control">
            <option th:each="s : ${semesterOptionsForUsers}" th:value="${s}" th:text="'Semester ' + ${s}">Semester 1</option>
          </select>
        </div>
        <div style="display:flex;gap:0.75rem">
          <button type="submit" class="btn btn-primary">Create User</button>
          <button type="button" onclick="document.getElementById('createModal').style.display='none'"
                  class="btn btn-outline">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
<script>
function toggleNewUserSemester() {
  const role = document.getElementById('newUserRole').value;
  document.getElementById('newUserSemesterGroup').style.display = (role === 'STUDENT') ? 'block' : 'none';
}
document.addEventListener('DOMContentLoaded', toggleNewUserSemester);
</script>
</main>
</html>
