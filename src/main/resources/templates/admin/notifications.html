<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/layout :: layout(~{::title}, ~{::main})}">
<title>Notifications — StudyLock Admin</title>
<main>
<div class="page-header">
    <h1 class="page-title">📣 Broadcast Notifications</h1>
    <p class="page-subtitle">Send announcements to users</p>
</div>

<div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
<div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

<div class="card">
    <div class="card-header"><h3 class="card-title">Send Broadcast</h3></div>
    <div class="card-body">
        <form method="post" th:action="@{/admin/notifications/broadcast}">
            <div class="form-group">
                <label class="form-label">Target Audience</label>
                <select name="targetRole" class="form-control">
                    <option value="all">All Users</option>
                    <option value="student">Students Only</option>
                    <option value="lecturer">Lecturers Only</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" placeholder="Notification title" required>
            </div>
            <div class="form-group">
                <label class="form-label">Message</label>
                <textarea name="message" class="form-control" rows="4" placeholder="Your message..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">📤 Send Broadcast</button>
        </form>
    </div>
</div>
</main>
</html>
