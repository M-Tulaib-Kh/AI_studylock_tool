<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{shared/layout :: layout(~{::title}, ~{::main})}">
<title>Lecturer Overview</title>
<main>

<div class="page-header">
  <h1 class="page-title">👨‍🏫 Lecturer Overview</h1>
  <p class="page-subtitle">See which lecturer teaches which courses and how many students are enrolled</p>
</div>

<div th:each="o : ${overview}" class="card" style="margin-bottom:1.5rem">
  <div class="card-header" style="gap:1rem;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:0.875rem">
      <div style="width:44px;height:44px;background:var(--primary-gradient);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1.1rem"
           th:text="${#strings.substring(o.lecturer.fullName,0,1)}">L</div>
      <div>
        <div style="font-weight:700;font-size:1rem" th:text="${o.lecturer.fullName}">Name</div>
        <div style="font-size:0.82rem;color:var(--text-muted)" th:text="${o.lecturer.email}">email</div>
      </div>
    </div>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
      <span class="badge" style="background:var(--primary-light);color:var(--primary)" th:text="${o.courseCount} + ' courses'">0 courses</span>
      <span class="badge" style="background:rgba(16,185,129,0.1);color:#10b981" th:text="${o.totalStudents} + ' students'">0 students</span>
      <span class="badge" style="background:rgba(59,130,246,0.1);color:#3b82f6" th:text="${o.lectureCount} + ' lectures'">0 lectures</span>
    </div>
  </div>

  <div style="padding:0">
    <div th:if="${o.courses.isEmpty()}" style="padding:1.5rem;text-align:center;color:var(--text-muted)">No courses assigned yet</div>

    <div th:each="cs : ${o.courseStudents}"
         style="padding:1rem 1.5rem;border-bottom:1px solid var(--border-light)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">
        <div style="font-weight:600" th:text="'📘 ' + ${cs.course.title}">Course</div>
        <span class="badge" style="background:var(--primary-light);color:var(--primary)"
              th:text="${cs.studentCount} + ' enrolled'">0</span>
      </div>

      <!-- Student avatars/list -->
      <div th:if="${!cs.students.isEmpty()}"
           style="display:flex;flex-wrap:wrap;gap:0.5rem">
        <div th:each="s : ${cs.students}"
             style="display:flex;align-items:center;gap:0.4rem;background:var(--bg);border-radius:20px;padding:3px 10px 3px 4px;font-size:0.8rem">
          <div style="width:22px;height:22px;background:var(--primary-gradient);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.65rem;font-weight:700"
               th:text="${#strings.substring(s.fullName,0,1)}">S</div>
          <span th:text="${s.fullName}">Student</span>
        </div>
      </div>
      <div th:if="${cs.students.isEmpty()}" style="font-size:0.82rem;color:var(--text-muted)">No students enrolled yet</div>
    </div>
  </div>
</div>

<div th:if="${overview.isEmpty()}" class="card" style="text-align:center;padding:3rem;color:var(--text-muted)">
  <div style="font-size:3rem;margin-bottom:0.75rem">👨‍🏫</div>
  <div>No lecturers found. Create lecturers from the Users panel.</div>
</div>

</main>
</html>
