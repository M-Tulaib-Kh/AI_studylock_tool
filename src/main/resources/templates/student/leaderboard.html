<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{shared/layout :: layout(~{::title}, ~{::main})}">
<title>Leaderboard</title>
<main>
<div class="page-header">
  <h1 class="page-title">🏆 Student Leaderboard</h1>
  <p class="page-subtitle">See where you stand among your peers</p>
</div>

<!-- My Rank Card -->
<div th:if="${myState != null}" class="card" style="margin-bottom:1.5rem;background:var(--primary-gradient);border:none;color:#fff">
  <div class="card-body" style="display:flex;align-items:center;gap:1.5rem">
    <div style="font-size:3rem">🎯</div>
    <div>
      <div style="font-size:0.9rem;opacity:0.85">Your Score</div>
      <div style="font-size:2.5rem;font-weight:800" th:text="${myState.points}">0</div>
      <div style="opacity:0.85">Level <span th:text="${myState.level}">1</span> • Streak: <span th:text="${myState.streak}">0</span> days</div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header"><h3 class="card-title">🏅 Rankings</h3></div>
  <div style="overflow-x:auto">
    <table class="table">
      <thead><tr><th>#</th><th>Student</th><th>Points</th><th>Level</th><th>Streak</th><th>Status</th></tr></thead>
      <tbody>
        <tr th:each="gs, iter : ${leaderboard}"
            th:style="${gs.user.id == user.id} ? 'background:var(--primary-light)' : ''">
          <td>
            <div th:if="${iter.index == 0}" class="lb-rank-1" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800">1</div>
            <div th:if="${iter.index == 1}" class="lb-rank-2" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800">2</div>
            <div th:if="${iter.index == 2}" class="lb-rank-3" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800">3</div>
            <span th:if="${iter.index > 2}" th:text="${iter.index + 1}" style="font-weight:600;color:var(--text-muted)"></span>
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:0.75rem">
              <div style="width:36px;height:36px;border-radius:50%;background:var(--primary-gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:0.9rem"
                   th:text="${#strings.substring(gs.user.fullName,0,1)}"></div>
              <div>
                <div style="font-weight:600" th:text="${gs.user.fullName}">Name</div>
                <div style="font-size:0.8rem;color:var(--text-muted)" th:text="${gs.user.department ?: 'Student'}"></div>
              </div>
            </div>
          </td>
          <td><strong th:text="${gs.points}">0</strong> XP</td>
          <td><span style="background:var(--primary-light);color:var(--primary);padding:2px 10px;border-radius:20px;font-weight:600;font-size:0.85rem" th:text="'Lv. ' + ${gs.level}"></span></td>
          <td>🔥 <span th:text="${gs.streak}">0</span> days</td>
          <td>
            <span th:if="${gs.user.id == user.id}" style="background:#10b981;color:#fff;padding:2px 10px;border-radius:20px;font-size:0.8rem;font-weight:600">You</span>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(leaderboard)}">
          <td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted)">No data yet. Start studying!</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</main>
</html>
