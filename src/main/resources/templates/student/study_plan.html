<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{shared/layout :: layout(~{::title}, ~{::main})}">
<title>Study Plan</title>
<main>
<div class="page-header">
  <h1 class="page-title">📅 AI Study Planner</h1>
  <p class="page-subtitle">Generate a personalized study plan with AI</p>
</div>

<!-- Generator Card -->
<div class="card" style="margin-bottom:1.5rem;border:2px solid rgba(124,58,237,0.3);background:var(--primary-light)">
  <div class="card-body">
    <h3 style="color:var(--primary);margin-bottom:1rem">✨ Generate New Study Plan</h3>
    <form th:action="@{/student/study-plan/generate}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Subject / Course</label>
          <input type="text" name="subject" class="form-control" placeholder="e.g. Data Structures" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Duration (Weeks)</label>
          <select name="weeks" class="form-control">
            <option value="2">2 Weeks</option>
            <option value="4" selected>4 Weeks</option>
            <option value="6">6 Weeks</option>
            <option value="8">8 Weeks</option>
            <option value="12">12 Weeks</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Goals &amp; Current Level</label>
        <textarea name="goals" class="form-control" rows="2" placeholder="e.g. I'm a beginner, want to learn sorting algorithms and trees for my exam in 4 weeks" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary"><i class="ti ti-sparkles"></i> Generate Plan with AI</button>
    </form>
  </div>
</div>

<!-- Existing Plans -->
<div th:if="${#lists.isEmpty(plans)}" class="card">
  <div class="card-body" style="text-align:center;padding:3rem;color:var(--text-muted)">
    <div style="font-size:3rem">📅</div>
    <p>No study plans yet. Generate your first one above!</p>
  </div>
</div>

<div th:each="plan : ${plans}" class="card" style="margin-bottom:1.5rem">
  <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <h3 class="card-title" th:text="${plan.title}">Plan Title</h3>
      <div style="font-size:0.8rem;color:var(--text-muted)" th:text="${#temporals.format(plan.createdAt,'dd MMM yyyy')}"></div>
    </div>
    <form method="post" th:action="@{'/student/study-plan/' + ${plan.id} + '/delete'}" onsubmit="return confirm('Delete this plan?')">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn btn-sm btn-danger"><i class="ti ti-trash"></i> Delete</button>
    </form>
  </div>
  <div class="card-body">
    <div id="plan-weeks" th:data-json="${plan.planJson}" class="plan-container"></div>
    <script th:inline="javascript">
    (function(){
      var containers = document.querySelectorAll('.plan-container:not([data-rendered])');
      containers.forEach(function(el){
        el.setAttribute('data-rendered','true');
        try {
          var weeks = JSON.parse(el.getAttribute('data-json'));
          if(!Array.isArray(weeks)) return;
          var html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem">';
          weeks.forEach(function(w){
            html += '<div style="border:1px solid var(--border,#e2e8f0);border-radius:12px;padding:1rem">';
            html += '<div style="font-weight:700;margin-bottom:0.5rem;color:var(--primary)">Week '+w.week+': '+w.title+'</div>';
            if(w.dailyHours) html += '<div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.5rem">⏱ '+w.dailyHours+'h/day</div>';
            if(w.topics && w.topics.length){
              html += '<div style="font-weight:600;font-size:0.85rem;margin-bottom:0.25rem">📖 Topics</div><ul style="margin:0 0 0.5rem 1rem;font-size:0.85rem;color:var(--text-muted)">';
              w.topics.forEach(function(t){ html += '<li>'+t+'</li>'; });
              html += '</ul>';
            }
            if(w.tasks && w.tasks.length){
              html += '<div style="font-weight:600;font-size:0.85rem;margin-bottom:0.25rem">✅ Tasks</div><ul style="margin:0 0 0 1rem;font-size:0.85rem;color:var(--text-muted)">';
              w.tasks.forEach(function(t){ html += '<li>'+t+'</li>'; });
              html += '</ul>';
            }
            html += '</div>';
          });
          html += '</div>';
          el.innerHTML = html;
        } catch(e){ el.textContent = 'Could not parse plan.'; }
      });
    })();
    </script>
  </div>
</div>
</main>
</html>
