<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/layout :: layout(~{::title}, ~{::main})}">
<title>Profile</title>
<main>
<div class="page-header"><h1 class="page-title">👤 My Profile</h1></div>

<div class="grid-2">
  <!-- Profile Card -->
  <div class="card">
    <div class="card-body" style="text-align:center;padding:2rem">
      <form th:action="@{/student/profile/update}" method="post" enctype="multipart/form-data" id="avatarForm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="fullName" th:value="${user.fullName}"/>
        <input type="file" id="avatarInput" name="avatar" accept="image/*" style="display:none"
               onchange="document.getElementById('avatarForm').submit()"/>
        <div onclick="document.getElementById('avatarInput').click()"
             style="width:96px;height:96px;border-radius:50%;background:var(--primary-gradient);display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:700;color:#fff;margin:0 auto 1rem;cursor:pointer;position:relative;overflow:hidden">
          <img th:if="${user.avatarUrl != null and !user.avatarUrl.isEmpty()}"
               th:src="@{'/uploads/avatars/' + ${user.avatarUrl}}" style="width:100%;height:100%;object-fit:cover"/>
          <span th:unless="${user.avatarUrl != null and !user.avatarUrl.isEmpty()}"
                th:text="${#strings.substring(user.fullName,0,1)}"></span>
        </div>
      </form>
      <div style="font-size:1.25rem;font-weight:700" th:text="${user.fullName}"></div>
      <div style="color:var(--text-muted);margin:0.25rem 0" th:text="${user.email}"></div>
      <span class="badge badge-purple" th:text="${user.role}"></span>
      <div th:if="${gameState != null}" class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-top:1.5rem">
        <div style="text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:var(--primary)" th:text="${gameState.level}">1</div>
          <div style="font-size:0.78rem;color:var(--text-muted)">Level</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:var(--primary)" th:text="${gameState.points}">0</div>
          <div style="font-size:0.78rem;color:var(--text-muted)">XP</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:#ef4444" th:text="${gameState.streak}">0</div>
          <div style="font-size:0.78rem;color:var(--text-muted)">Streak</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Form -->
  <div class="card">
    <div class="card-header"><h3 class="card-title">Edit Profile</h3></div>
    <div class="card-body">
      <form th:action="@{/student/profile/update}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="fullName" class="form-control" th:value="${user.fullName}" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Department</label>
          <input type="text" name="department" class="form-control" th:value="${user.department}" placeholder="e.g. Computer Science"/>
        </div>
        <div class="form-group">
          <label class="form-label">Registration No.</label>
          <input type="text" name="registrationNo" class="form-control" th:value="${user.registrationNo}"/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Save Changes</button>
      </form>

      <hr style="margin:1.5rem 0;border:none;border-top:1px solid var(--border)"/>

      <form th:action="@{/student/profile/change-password}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
          <label class="form-label">Current Password</label>
          <input type="password" name="oldPassword" class="form-control" required/>
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" name="newPassword" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-outline" style="width:100%;justify-content:center">Change Password</button>
      </form>
    </div>
  </div>
</div>
</main>
</html>
