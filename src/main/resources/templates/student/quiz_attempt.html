<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Quiz — StudyLock</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css" rel="stylesheet"/>
  <style>
    body { background:#0c0b18; color:#e8e3ff; margin:0; font-family:'Inter',sans-serif; }
    .quiz-wrap { max-width:720px; margin:0 auto; padding:1.5rem; min-height:100vh; display:flex; flex-direction:column; }
    .quiz-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
    .quiz-timer { background:#1a1828; color:#06b6d4; padding:8px 18px; border-radius:20px; font-weight:800; font-size:1rem; }
    .quiz-timer.urgent { color:#ef4444; animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .q-box { background:#1a1828; border:1px solid rgba(124,58,237,0.2); border-radius:16px; padding:1.5rem; margin-bottom:1rem; }
    .option { padding:0.9rem 1rem; border:2px solid rgba(124,58,237,0.15); border-radius:12px; margin-bottom:0.5rem; cursor:pointer; display:flex; align-items:center; gap:0.75rem; transition:all 0.15s; background:#1a1828; }
    .option:hover { border-color:rgba(124,58,237,0.5); background:rgba(124,58,237,0.08); }
    .option.selected { border-color:#7c3aed; background:rgba(124,58,237,0.15); }
    .option-letter { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; background:#231f35; color:#8b80b3; flex-shrink:0; }
    .option.selected .option-letter { background:#7c3aed; color:#fff; }
  </style>
</head>
<body>
<div class="quiz-wrap">
  <!-- Header -->
  <div class="quiz-header">
    <button onclick="if(confirm('Quit quiz? Progress will be lost.'))history.back()"
            style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#f87171;padding:8px 16px;border-radius:10px;cursor:pointer;font-weight:600;font-size:0.85rem">
      ✕ Quit
    </button>
    <div style="text-align:center">
      <div style="font-weight:800;color:#fff;font-size:0.95rem" th:text="${quiz.title}">Quiz</div>
      <div style="font-size:0.78rem;color:#6d6492" th:text="${quiz.subject}"></div>
    </div>
    <div class="quiz-timer" id="timerBox">
      <i class="ti ti-clock"></i> <span id="timerDisplay">--:--</span>
    </div>
  </div>

  <!-- Quiz file download (if quiz has attached file) -->
  <div th:if="${quiz.fileUrl != null and !quiz.fileUrl.isEmpty()}"
       style="background:#1a1828;border:1px solid rgba(124,58,237,0.25);border-radius:12px;padding:1rem;margin-bottom:1rem;display:flex;align-items:center;gap:1rem">
    <span style="font-size:1.5rem">📄</span>
    <div style="flex:1">
      <div style="font-weight:600;font-size:0.9rem">Quiz File</div>
      <div style="color:#6d6492;font-size:0.8rem" th:text="${quiz.fileName ?: 'Download'}"></div>
    </div>
    <a th:href="@{${quiz.fileUrl}}" th:attr="download=${quiz.fileName}" target="_blank"
       style="background:rgba(124,58,237,0.2);color:#a78bfa;padding:8px 16px;border-radius:8px;text-decoration:none;font-weight:600;font-size:0.85rem">
      <i class="ti ti-download"></i> View / Download
    </a>
  </div>

  <!-- Written quiz (file upload submission) -->
  <div th:if="${quiz.fileUrl != null and quiz.questionsJson == '[]'}"
       style="flex:1;display:flex;flex-direction:column;gap:1rem">
    <div style="background:#1a1828;border-radius:16px;padding:1.5rem;text-align:center">
      <div style="font-size:2rem;margin-bottom:0.75rem">✍️</div>
      <div style="font-weight:700;margin-bottom:0.5rem">Written Quiz</div>
      <div style="color:#6d6492;font-size:0.875rem;margin-bottom:1.5rem">Download the quiz file, answer it, and upload your solution.</div>
      <form th:action="@{'/student/quiz/' + ${quiz.id} + '/submit-file'}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div style="border:2px dashed rgba(124,58,237,0.3);border-radius:12px;padding:1.5rem;cursor:pointer;margin-bottom:1rem"
             onclick="document.getElementById('ansFile').click()">
          <div style="font-size:1.5rem;margin-bottom:0.25rem">📁</div>
          <div style="color:#6d6492;font-size:0.875rem">Click to choose your answer file</div>
          <div id="ansFileName" style="display:none;color:#a78bfa;font-weight:600;margin-top:0.5rem"></div>
        </div>
        <input type="file" id="ansFile" name="file" accept=".pdf,.doc,.docx,.zip"
               style="display:none"
               onchange="document.getElementById('ansFileName').textContent=this.files[0].name;document.getElementById('ansFileName').style.display='block'"/>
        <button type="submit" style="width:100%;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border:none;padding:0.85rem;border-radius:12px;font-weight:700;font-size:1rem;cursor:pointer">
          <i class="ti ti-send"></i> Submit Answer
        </button>
      </form>
    </div>
  </div>

  <!-- MCQ Quiz -->
  <div th:if="${quiz.questionsJson != null and quiz.questionsJson != '[]'}">
    <!-- Progress -->
    <div style="background:#1a1828;border-radius:99px;height:6px;margin-bottom:0.5rem">
      <div id="quizProgress" style="height:100%;background:linear-gradient(90deg,#7c3aed,#06b6d4);border-radius:99px;width:0%;transition:width 0.3s"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:1.5rem">
      <small id="qInfo" style="color:#6d6492">Question 1</small>
      <small id="answered" style="color:#6d6492">0 answered</small>
    </div>

    <div id="questionArea" style="flex:1"></div>

    <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
      <button id="prevBtn" onclick="prevQ()" style="display:none;flex:1;background:#1a1828;border:1px solid rgba(124,58,237,0.2);color:#a78bfa;padding:0.65rem;border-radius:12px;cursor:pointer;font-weight:600">← Prev</button>
      <button id="nextBtn" onclick="nextQ()" style="flex:2;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border:none;padding:0.65rem;border-radius:12px;cursor:pointer;font-weight:600">Next →</button>
      <button id="submitBtn" onclick="showSubmit()" style="display:none;flex:2;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;padding:0.65rem;border-radius:12px;cursor:pointer;font-weight:600">✓ Submit Quiz</button>
    </div>
  </div>
</div>

<!-- Submit Modal -->
<div id="submitModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;z-index:100">
  <div style="background:#1a1828;border:1px solid rgba(124,58,237,0.3);border-radius:20px;padding:2rem;max-width:380px;width:90%;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:0.75rem">🎯</div>
    <h3 style="color:#fff;margin-bottom:0.5rem">Submit Quiz?</h3>
    <p id="unansweredMsg" style="color:#6d6492;margin-bottom:1.5rem;font-size:0.9rem"></p>
    <div style="display:flex;gap:0.75rem">
      <button onclick="document.getElementById('submitModal').style.display='none'" style="flex:1;background:#231f35;border:1px solid rgba(124,58,237,0.2);color:#a78bfa;padding:0.65rem;border-radius:12px;cursor:pointer;font-weight:600">Cancel</button>
      <button onclick="doSubmit()" style="flex:1;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;padding:0.65rem;border-radius:12px;cursor:pointer;font-weight:700">✓ Submit</button>
    </div>
  </div>
</div>

<form id="quizForm" th:action="@{'/student/quiz/' + ${quiz.id} + '/submit'}" method="post" style="display:none">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
  <div id="hiddenAnswers"></div>
</form>

<script th:inline="javascript">
const questions    = JSON.parse(/*[[${questionsJson}]]*/ '[]');
const totalMinutes = /*[[${quiz.durationMinutes}]]*/ 15;
const answers = {};
let current = 0, timeLeft = totalMinutes * 60;

function render(){
  if(!questions.length) return;
  const q   = questions[current];
  const pct = ((current+1)/questions.length)*100;
  document.getElementById('quizProgress').style.width = pct+'%';
  document.getElementById('qInfo').textContent      = 'Question '+(current+1)+' of '+questions.length;
  document.getElementById('answered').textContent   = Object.keys(answers).length+' answered';
  document.getElementById('prevBtn').style.display  = current>0?'flex':'none';
  document.getElementById('nextBtn').style.display  = current<questions.length-1?'flex':'none';
  document.getElementById('submitBtn').style.display= current===questions.length-1?'flex':'none';

  const opts = ['A','B','C','D'].filter(o=>q['option'+o]);
  const html = `
    <div class="q-box">
      <p style="color:#6d6492;font-size:0.78rem;margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.5px">Question ${current+1} / ${questions.length}</p>
      <p style="color:#e8e3ff;font-size:1.05rem;font-weight:600;line-height:1.7;margin:0">${q.questionText}</p>
    </div>
    ${opts.map(o=>`
    <div class="option ${answers[q.id]===o?'selected':''}" onclick="pick('${q.id}','${o}',this)">
      <div class="option-letter">${o}</div>
      <span style="color:#e8e3ff">${q['option'+o]}</span>
    </div>`).join('')}`;
  document.getElementById('questionArea').innerHTML = html;
}

function pick(id,opt){ answers[id]=opt; render(); }
function prevQ(){ if(current>0){current--;render();} }
function nextQ(){ if(current<questions.length-1){current++;render();} }

function showSubmit(){
  const ua = questions.length - Object.keys(answers).length;
  document.getElementById('unansweredMsg').textContent = ua>0
    ? ua+' question(s) not answered yet. Submit anyway?'
    : 'All '+questions.length+' questions answered. Ready to submit!';
  document.getElementById('submitModal').style.display='flex';
}

function doSubmit(){
  const c = document.getElementById('hiddenAnswers');
  c.innerHTML='';
  questions.forEach(q=>{
    if(answers[q.id]){
      const i=document.createElement('input');
      i.type='hidden'; i.name='answer_'+q.id; i.value=answers[q.id]; c.appendChild(i);
    }
  });
  document.getElementById('quizForm').submit();
}

// Timer
const timerEl = document.getElementById('timerDisplay');
const timerBox = document.getElementById('timerBox');
const timer = setInterval(()=>{
  timeLeft--;
  const m=Math.floor(timeLeft/60), s=timeLeft%60;
  timerEl.textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  if(timeLeft<=60) timerBox.classList.add('urgent');
  if(timeLeft<=0){ clearInterval(timer); doSubmit(); }
},1000);

if(questions.length) render();
</script>
</body>
</html>
