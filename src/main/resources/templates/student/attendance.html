<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{shared/layout :: layout(~{::title}, ~{::main})}">
<title>My Attendance</title>
<main>
<div class="page-header">
  <h1 class="page-title">📅 My Attendance</h1>
  <p class="page-subtitle">Track your attendance across all courses</p>
</div>

<!-- Per-course Summary -->
<div th:if="${#lists.isEmpty(summary)}" class="card">
  <div class="card-body" style="text-align:center;padding:3rem;color:var(--text-muted)">
    <div style="font-size:3rem">📅</div>
    <p>No attendance records yet.</p>
  </div>
</div>

<div class="stats-grid" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr));margin-bottom:1.5rem">
  <div th:each="s : ${summary}" class="stat-card" style="flex-direction:column;align-items:flex-start;gap:0.75rem">
    <div style="font-weight:700;font-size:1rem" th:text="${s.course.title}">Course</div>
    <div style="display:flex;gap:1rem;font-size:0.875rem">
      <span class="status-present">✓ <span th:text="${s.present}">0</span> Present</span>
      <span class="status-late">⚡ <span th:text="${s.late}">0</span> Late</span>
      <span class="status-absent">✗ <span th:text="${s.absent}">0</span> Absent</span>
    </div>
    <div style="width:100%">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:0.8rem">
        <span>Attendance Rate</span>
        <strong th:text="${s.percentage} + '%'">0%</strong>
      </div>
      <div class="progress-bar">
        <div class="progress-fill"
             th:classappend="${s.percentage >= 75} ? 'green' : (${s.percentage >= 50} ? 'amber' : 'red')"
             th:style="'width:' + ${s.percentage} + '%'"></div>
      </div>
      <div th:if="${s.percentage < 75}" style="color:#ef4444;font-size:0.78rem;margin-top:4px">⚠ Below 75% — attend more classes!</div>
    </div>
  </div>
</div>

<!-- Detailed Records -->
<div class="card" th:if="${!#lists.isEmpty(records)}">
  <div class="card-header"><h3 class="card-title">Attendance History</h3></div>
  <div style="overflow-x:auto">
    <table class="table">
      <thead><tr><th>Date</th><th>Course</th><th>Status</th></tr></thead>
      <tbody>
        <tr th:each="r : ${records}">
          <td th:text="${#temporals.format(r.attendanceDate,'dd MMM yyyy')}"></td>
          <td th:text="${r.course.title}"></td>
          <td>
            <span th:if="${r.status.name()=='PRESENT'}" class="status-present">✓ Present</span>
            <span th:if="${r.status.name()=='LATE'}" class="status-late">⚡ Late</span>
            <span th:if="${r.status.name()=='ABSENT'}" class="status-absent">✗ Absent</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</main>
</html>
