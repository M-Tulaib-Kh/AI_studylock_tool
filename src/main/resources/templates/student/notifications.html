<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/layout :: layout(~{::title}, ~{::main})}">
<title>Notifications</title>
<main>
<div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start">
  <div>
    <h1 class="page-title">🔔 Notifications</h1>
    <p class="page-subtitle" th:text="${unreadCount} + ' unread'"></p>
  </div>
  <form method="post" th:action="@{/student/notifications/read-all}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" class="btn btn-outline">Mark all read</button>
  </form>
</div>

<div class="card">
  <div class="card-body" style="padding:0">
    <div th:each="n : ${notifications}">
      <!-- unread row -->
      <div th:if="${!n.read}"
           style="display:flex;align-items:flex-start;gap:1rem;padding:1rem 1.25rem;border-bottom:1px solid var(--border-light);background:var(--primary-light)">
        <div style="width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;background:var(--surface-2)">
          <span th:if="${n.type == 'grade'}">📊</span>
          <span th:if="${n.type == 'deadline'}">⏰</span>
          <span th:if="${n.type == 'badge'}">🏆</span>
          <span th:if="${n.type != 'grade' and n.type != 'deadline' and n.type != 'badge'}">📢</span>
        </div>
        <div style="flex:1">
          <div style="font-weight:600" th:text="${n.title}"></div>
          <div style="color:var(--text-muted);font-size:0.875rem;margin-top:2px" th:text="${n.message}"></div>
          <div style="color:var(--text-muted);font-size:0.75rem;margin-top:4px"
               th:text="${#temporals.format(n.createdAt,'dd MMM yyyy HH:mm')}"></div>
        </div>
        <div style="width:8px;height:8px;background:var(--primary);border-radius:50%;margin-top:4px;flex-shrink:0"></div>
      </div>
      <!-- read row -->
      <div th:if="${n.read}"
           style="display:flex;align-items:flex-start;gap:1rem;padding:1rem 1.25rem;border-bottom:1px solid var(--border-light)">
        <div style="width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;background:var(--surface-2)">
          <span th:if="${n.type == 'grade'}">📊</span>
          <span th:if="${n.type == 'deadline'}">⏰</span>
          <span th:if="${n.type == 'badge'}">🏆</span>
          <span th:if="${n.type != 'grade' and n.type != 'deadline' and n.type != 'badge'}">📢</span>
        </div>
        <div style="flex:1">
          <div style="font-weight:600;color:var(--text-muted)" th:text="${n.title}"></div>
          <div style="color:var(--text-muted);font-size:0.875rem;margin-top:2px" th:text="${n.message}"></div>
          <div style="color:var(--text-muted);font-size:0.75rem;margin-top:4px"
               th:text="${#temporals.format(n.createdAt,'dd MMM yyyy HH:mm')}"></div>
        </div>
      </div>
    </div>
    <div th:if="${#lists.isEmpty(notifications)}"
         style="padding:3rem;text-align:center;color:var(--text-muted)">
      <div style="font-size:3rem;margin-bottom:0.5rem">🔔</div>
      <p>No notifications yet</p>
    </div>
  </div>
</div>
</main>
</html>
