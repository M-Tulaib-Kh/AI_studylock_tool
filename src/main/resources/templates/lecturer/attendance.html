<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{shared/layout :: layout(~{::title}, ~{::main})}">
<title>Mark Attendance</title>
<main>
<div class="page-header">
  <h1 class="page-title">📅 Attendance Management</h1>
  <p class="page-subtitle">Mark and track student attendance by course</p>
</div>

<!-- Filter Form -->
<div class="card" style="margin-bottom:1.5rem">
  <div class="card-body">
    <form method="get" th:action="@{/lecturer/attendance}" style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end">
      <div class="form-group" style="margin:0;flex:1;min-width:200px">
        <label class="form-label">Course</label>
        <select name="courseId" class="form-control course-select" required>
          <option value="">Select course...</option>
          <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.title}"
                  th:attr="data-meta=${c.subject + ' · Sem ' + c.semester + ' · ' + c.creditHours + ' credit hrs'}"
                  th:selected="${c.id == selectedCourseId}">Course</option>
        </select>
      </div>
      <div class="form-group" style="margin:0;flex:1;min-width:180px">
        <label class="form-label">Date</label>
        <input type="date" name="date" class="form-control"
               th:value="${selectedDate}"/>
      </div>
      <button type="submit" class="btn btn-primary"><i class="ti ti-search"></i> Load Students</button>
    </form>
  </div>
</div>

<!-- Attendance Table -->
<div class="card" th:if="${students != null}">
  <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
    <h3 class="card-title">Mark Attendance — <span th:text="${selectedDate}"></span></h3>
    <div style="display:flex;gap:0.5rem">
      <button onclick="markAll('PRESENT')" class="btn btn-sm" style="background:#10b981;color:#fff">✓ All Present</button>
      <button onclick="markAll('ABSENT')" class="btn btn-sm btn-danger">✗ All Absent</button>
    </div>
  </div>
  <div class="card-body">
    <form method="post" th:action="@{/lecturer/attendance/mark}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="courseId" th:value="${selectedCourseId}"/>
      <input type="hidden" name="date" th:value="${selectedDate}"/>
      <div style="overflow-x:auto">
        <table class="table">
          <thead><tr><th>Student</th><th>Status</th></tr></thead>
          <tbody>
            <tr th:each="s : ${students}">
              <td>
                <div style="font-weight:600" th:text="${s.fullName}"></div>
                <div style="font-size:0.8rem;color:var(--text-muted)" th:text="${s.registrationNo ?: s.email}"></div>
              </td>
              <td>
                <div style="display:flex;gap:0.5rem">
                  <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
                    <input type="radio" th:name="'status_' + ${s.id}" value="PRESENT"
                           th:checked="${existingMap[s.id] == null or existingMap[s.id].name()=='PRESENT'}"/>
                    <span class="status-present">Present</span>
                  </label>
                  <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
                    <input type="radio" th:name="'status_' + ${s.id}" value="LATE"
                           th:checked="${existingMap[s.id] != null and existingMap[s.id].name()=='LATE'}"/>
                    <span class="status-late">Late</span>
                  </label>
                  <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
                    <input type="radio" th:name="'status_' + ${s.id}" value="ABSENT"
                           th:checked="${existingMap[s.id] != null and existingMap[s.id].name()=='ABSENT'}"/>
                    <span class="status-absent">Absent</span>
                  </label>
                </div>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(students)}">
              <td colspan="2" style="text-align:center;padding:2rem;color:var(--text-muted)">No students found.</td>
            </tr>
          </tbody>
        </table>
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top:1rem;width:100%;justify-content:center">
        <i class="ti ti-check"></i> Save Attendance
      </button>
    </form>
  </div>
</div>

<div class="card" th:if="${students == null}">
  <div class="card-body" style="text-align:center;padding:3rem;color:var(--text-muted)">
    <div style="font-size:3rem">📅</div>
    <p>Select a course and date above to mark attendance.</p>
  </div>
</div>

<script>
function markAll(status) {
  document.querySelectorAll('input[type="radio"]').forEach(function(r) {
    if (r.value === status) r.checked = true;
  });
}
</script>
</main>
</html>
