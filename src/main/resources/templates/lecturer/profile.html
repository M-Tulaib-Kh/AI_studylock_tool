<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/layout :: layout(~{::title}, ~{::main})}">
<title>Profile</title>
<main>
<div class="page-header"><h1 class="page-title">👤 My Profile</h1></div>
<div class="grid-2">
  <div class="card">
    <div class="card-body" style="text-align:center;padding:2rem">
      <div style="width:96px;height:96px;border-radius:50%;background:var(--primary-gradient);display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:700;color:#fff;margin:0 auto 1rem"
           th:text="${#strings.substring(user.fullName,0,1)}"></div>
      <div style="font-size:1.25rem;font-weight:700" th:text="${user.fullName}"></div>
      <div style="color:var(--text-muted)" th:text="${user.email}"></div>
      <span class="badge badge-blue" style="margin-top:0.5rem" th:text="${user.designation ?: 'Lecturer'}"></span>
      <div style="color:var(--text-muted);font-size:0.875rem;margin-top:0.5rem" th:text="${user.department}"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><h3 class="card-title">Edit Profile</h3></div>
    <div class="card-body">
      <form th:action="@{/lecturer/profile/update}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="fullName" class="form-control" th:value="${user.fullName}" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Department</label>
          <input type="text" name="department" class="form-control" th:value="${user.department}"/>
        </div>
        <div class="form-group">
          <label class="form-label">Designation</label>
          <input type="text" name="designation" class="form-control" th:value="${user.designation}" placeholder="e.g. Assistant Professor"/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Save Changes</button>
      </form>
    </div>
  </div>
</div>
</main>
</html>
