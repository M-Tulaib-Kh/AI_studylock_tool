# ═══════════════════════════════════════════════════
#  StudyLock — Application Configuration
# ═══════════════════════════════════════════════════

spring.application.name=StudyLock

# ── Database (MySQL / XAMPP) ────────────────────────
# Overridable via SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD env vars (used by docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/studylock_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Thymeleaf ──────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── File Upload ────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
file.upload-dir=./uploads

# ── Session ────────────────────────────────────────
server.servlet.session.timeout=3600s

# ── OpenRouter AI API ───────────────────────────────
# OpenRouter API key — used for Quiz Gen, AI Tutor, Study Plans, Summaries (all English-only)
# NEVER hardcode the real key here — this file is committed to git.
# Set the real value via the OPENROUTER_API_KEY environment variable, or in
# application-local.properties (gitignored, see application-local.properties.example).
openrouter.api.key=${OPENROUTER_API_KEY:CHANGE_ME}

# ── Logging ────────────────────────────────────────
logging.level.com.studylock=INFO
logging.level.org.springframework.security=WARN
